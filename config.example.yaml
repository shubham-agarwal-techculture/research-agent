# Copy to config.yaml and adjust as needed.

data_dir: data
timezone: UTC

scheduler:
  run_times:
    - "09:00"
    - "21:00"
  retry:
    max_attempts: 3
    delay_seconds: 60

ingestion:
  max_results_per_source: 5
  enabled_sources:
    - arxiv
    - rss

output:
  format: markdown
  directory: outputs

api:
  host: 0.0.0.0
  port: 8000
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  jwt_secret: change-me-in-production
  jwt_expire_minutes: 10080

rss_feeds:
  - name: MIT Technology Review AI
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed/
  - name: arXiv cs.AI (RSS)
    url: https://rss.arxiv.org/rss/cs.AI
